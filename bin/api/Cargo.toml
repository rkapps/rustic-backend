[package]
name = "rustic-ai-api"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "rustic-ai-api"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
axum.workspace = true
futures.workspace = true
jsonwebtoken.workspace = true

reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_with.workspace = true

tokio.workspace = true
tower-http.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

bin-shared = { path = "../shared" }

rustic-agent.workspace=true
rustic-boot.workspace=true
rustic-core.workspace=true
rustic-economic = { workspace = true, features = ["reader"] }
rustic-finance.workspace=true
rustic-ml.workspace=true
rustic-providers.workspace=true
rustic-storage.workspace = true

